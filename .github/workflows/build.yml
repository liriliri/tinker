name: Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - macos-intel
          - linux

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJSON(
          github.event.inputs.platform == 'all' && '["windows-2025","macos-latest","macos-15-intel","ubuntu-latest"]' ||
          github.event.inputs.platform == 'windows' && '["windows-2025"]' ||
          github.event.inputs.platform == 'macos' && '["macos-latest"]' ||
          github.event.inputs.platform == 'macos-intel' && '["macos-15-intel"]' ||
          github.event.inputs.platform == 'linux' && '["ubuntu-latest"]' ||
          '["windows-2025","macos-latest","macos-15-intel","ubuntu-latest"]'
          ) }}

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - uses: actions/setup-node@v5
      with:
        node-version: '24.x'
    - run: |
        npm i
        npm run init
        npm run build
        npm run pack
      env:
        GITHUB_TOKEN: ${{ github.token }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        CSC_LINK: ${{ startsWith(matrix.os, 'macos') && secrets.CSC_LINK || '' }}
        CSC_KEY_PASSWORD: ${{ startsWith(matrix.os, 'macos') && secrets.CSC_KEY_PASSWORD || '' }}
    - uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.os }}
        path: |
          release/**/*.dmg
          release/**/*.exe
          release/**/*.deb
          release/**/*.rpm
          release/**/*-lates*.yml
          !release/**/win-unpacked/
